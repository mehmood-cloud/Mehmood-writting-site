<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Mehmood" />
  <title>Mehmood</title>
  <link rel="stylesheet" href="Style.css" />
  <script>
    (function() {
      if (localStorage.getItem('light') === '1') document.documentElement.classList.add('light');
      var sz = parseInt(localStorage.getItem('sz') || '0');
      document.documentElement.style.setProperty('--base', [16,18,20][sz] + 'px');
    })();
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="wrap">
    <header>
      <strong class="site-name">Mehmood</strong>
      <ul class="intro-points">
        <li>polymath</li>
        <li>i write</li>
        <li class="no-dot">
          <form class="suggest-form" name="suggestions" netlify>
            <div class="suggest-row">
              <input class="suggest-input" type="text" name="suggestion" placeholder="any suggestions? opinions? thoughts?" required />
              <button class="suggest-btn" type="submit">send</button>
            </div>
          </form>
        </li>
      </ul>
    </header>
    <hr>

    <main>
      <div class="section-header">
        <span class="label">Writing</span>
        <div class="controls">
          <button class="ctrl-btn" id="theme-btn">dark</button>
          <button class="ctrl-btn" id="size-btn">text size</button>
        </div>
      </div>
      <ul class="writing-list">
        <li>
          <a href="Short Essays/Idk What Should I write.html">Idk What Should I Write</a>
          <span class="date">Jun 2026</span>
        </li>
      </ul>

    </main>
  </div>

  <script>
    (function() {
      var sizes = [16, 18, 20];
      var si = parseInt(localStorage.getItem('sz') || '0');
      var themeBtn = document.getElementById('theme-btn');

      function updateThemeLabel() {
        themeBtn.textContent = document.documentElement.classList.contains('light') ? 'dark' : 'light';
      }
      updateThemeLabel();

      themeBtn.addEventListener('click', function() {
        var l = document.documentElement.classList.toggle('light');
        localStorage.setItem('light', l ? '1' : '0');
        updateThemeLabel();
      });

      document.getElementById('size-btn').addEventListener('click', function() {
        si = (si + 1) % sizes.length;
        localStorage.setItem('sz', si);
        document.documentElement.style.setProperty('--base', sizes[si] + 'px');
      });
    })();
  </script>
</body>
</html>
