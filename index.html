    <!-- Fixed controls in top-right -->
    <div class="controls-fixed" aria-hidden="false">
      <button id="size-btn" class="ctrl-btn" aria-pressed="false">Size</button>
      <button id="theme-btn" class="ctrl-btn" aria-pressed="false">Color</button>
      <span id="controls-status" aria-live="polite" class="controls-status">&nbsp;</span>
    </div>

    <!-- Random title font script: picks one font from the list on each load -->
    <script>
      (function(){
        const fonts = ['Hachi Maru Pop','Mountains of Christmas','Henny Penny','Atma','DynaPuff','Fredoka One'];
        const limit = 4; // first N fonts to choose from
        const pool = fonts.slice(0, Math.max(1, Math.min(limit, fonts.length)));
        const pick = pool[Math.floor(Math.random()*pool.length)];
        const nameEl = document.querySelector('.name');
        if(nameEl){
          nameEl.style.fontFamily = `'${pick}', cursive`;
        }
      })();
    </script>

    <script>
        (function(){
          const wrap = document.querySelector('.wrap');
          const sizeBtn = document.getElementById('size-btn');
          const themeBtn = document.getElementById('theme-btn');
          const status = document.getElementById('controls-status');

          const sizeLevels = [1, 1.5, 2, 3]; // 0..3, 4th click wraps to 0
          let sizeIndex = 0; // start at default

          // Theme order: theme-1 should be the default first choice
          const themes = ['theme-1','theme-2','theme-3',''];
          // load saved theme/size from localStorage if available
          let themeIndex = 0;
          try{
            const savedTheme = localStorage.getItem('site-theme');
            const savedSize = localStorage.getItem('site-size');
            if(savedSize){
              const idx = sizeLevels.indexOf(Number(savedSize));
              if(idx >= 0) sizeIndex = idx;
            }
            if(savedTheme){
              const idx = themes.indexOf(savedTheme);
              if(idx >= 0) themeIndex = idx;
            }
          }catch(e){ /* ignore localStorage errors */ }

          function updateSize(){
            const mult = sizeLevels[sizeIndex];
            // apply CSS variable on wrap for transform scale
            wrap.style.setProperty('--scale', mult);
            // keep button label short, show current in status and tooltip
            sizeBtn.textContent = 'Size';
            sizeBtn.setAttribute('title', mult === 1 ? 'Original size' : '×' + mult);
            status.textContent = mult === 1 ? 'Size: original' : ('Size: ×' + mult);
          }

          function updateTheme(){
            // remove existing theme classes
            document.body.classList.remove('theme-1','theme-2','theme-3');
            const t = themes[themeIndex];
            if(t) document.body.classList.add(t);
            themeBtn.textContent = 'Color';
            themeBtn.setAttribute('title', t ? t : 'default');
            status.textContent = t ? ('Theme: ' + t.replace('theme-','')) : 'Theme: default';

            // persist
            try{ localStorage.setItem('site-theme', t || ''); }catch(e){}
          }

          themeBtn.addEventListener('click', function(){
            themeIndex = (themeIndex + 1) % themes.length;
            updateTheme();
          });

          // initialize labels
          updateSize();
          updateTheme();

          // (removed system dark/light auto-detection per request)

          // persist size changes
          const origUpdateSize = updateSize;
          function updateSizePersist(){
            origUpdateSize();
            try{ localStorage.setItem('site-size', sizeLevels[sizeIndex]); }catch(e){}
          }
          // replace the click handler to persist size
          sizeBtn.removeEventListener('click', function(){});
          sizeBtn.addEventListener('click', function(){
            sizeIndex = (sizeIndex + 1) % sizeLevels.length;
            updateSizePersist();
          });
        })();
      </script>
  </body>
