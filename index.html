<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Mehmood" />
  <title>Mehmood</title>
  <link rel="stylesheet" href="Style.css" />
  <script defer src="/_vercel/insights/script.js"></script>
  <script>
    (function() {
      if (localStorage.getItem('dark') === '1') document.documentElement.classList.add('dark');
      document.documentElement.style.setProperty('--base', [16,18,20][parseInt(localStorage.getItem('sz')||'0')] + 'px');
    })();
  </script>
</head>
<body>

  <div class="controls-fixed">
    <button class="ctrl-btn" id="theme-btn">theme</button>
    <button class="ctrl-btn" id="size-btn">font</button>
  </div>

  <strong class="site-name">Mehmood</strong>

  <ul class="intro-points">
    <li>Polymath</li>
    <li>The Greeks had Socrates, Y'all have me</li>
    <li class="no-dot">
      <form class="suggest-form" action="https://formspree.io/f/mvzjbgoj" method="POST">
        <div class="suggest-row">
          <input class="suggest-input" type="text" name="suggestion" placeholder="any suggestions? opinions? thoughts?" required />
          <button class="suggest-btn" type="submit">send</button>
        </div>
      </form>
    </li>
  </ul>

  <h2 class="section-title">Writings</h2>
  <ul class="writing-list">
    <li><a href="Short Essays/Visionary Marriage.html">Visionary Marriage</a></li>
    <li><a href="Short Essays/You Dont Know What You Dont Know.html">You Don't Know What You Don't Know</a></li>
  </ul>

  <script>
    (function() {
      var sizes = [16, 18, 20], si = parseInt(localStorage.getItem('sz') || '0');
      document.getElementById('theme-btn').addEventListener('click', function() {
        var d = document.documentElement.classList.toggle('dark');
        localStorage.setItem('dark', d ? '1' : '0');
      });
      document.getElementById('size-btn').addEventListener('click', function() {
        si = (si + 1) % sizes.length;
        localStorage.setItem('sz', si);
        document.documentElement.style.setProperty('--base', sizes[si] + 'px');
      });
    })();
  </script>
</body>
</html>
