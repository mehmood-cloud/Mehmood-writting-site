<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Mehmood" />
  <title>Mehmood</title>
  <link rel="stylesheet" href="Style.css" />
  <script defer src="/_vercel/insights/script.js"></script>
  <script>
    (function() {
      if (localStorage.getItem('light') === '1') document.documentElement.classList.add('light');
      document.documentElement.style.setProperty('--base', [16,18,20][parseInt(localStorage.getItem('sz')||'0')] + 'px');
    })();
  </script>
</head>
<body>

  <div class="controls-fixed">
    <button class="ctrl-btn" id="theme-btn">theme</button>
    <button class="ctrl-btn" id="size-btn">font</button>
  </div>

  <span class="top-label">Mehmood</span>

  <ul class="intro-points">
    <li>polymath</li>
    <li>i write</li>
    <li class="no-dot">
      <form class="suggest-form" name="suggestions" netlify>
        <div class="suggest-row">
          <input class="suggest-input" type="text" name="suggestion" placeholder="any suggestions? opinions? thoughts?" required />
          <button class="suggest-btn" type="submit">send</button>
        </div>
      </form>
    </li>
  </ul>

  <h2 class="section-title">Essays</h2>
  <ul class="writing-list">
    <li><a href="Short Essays/Idk What Should I write.html">Idk What Should I Write</a></li>
  </ul>

  <script>
    (function() {
      var sizes = [16, 18, 20], si = parseInt(localStorage.getItem('sz') || '0');
      var themeBtn = document.getElementById('theme-btn');
      function updateTheme() {
        themeBtn.textContent = document.documentElement.classList.contains('light') ? 'theme' : 'theme';
      }
      themeBtn.addEventListener('click', function() {
        var l = document.documentElement.classList.toggle('light');
        localStorage.setItem('light', l ? '1' : '0');
      });
      document.getElementById('size-btn').addEventListener('click', function() {
        si = (si + 1) % sizes.length;
        localStorage.setItem('sz', si);
        document.documentElement.style.setProperty('--base', sizes[si] + 'px');
      });
    })();
  </script>
</body>
</html>
