<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Writing — Mehmood</title>
  <link rel="stylesheet" href="Style.css" />
  <script>
    (function() {
      if (localStorage.getItem('dark') === '1' ||
          (localStorage.getItem('dark') === null && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
      var sz = parseInt(localStorage.getItem('sz') || '0');
      var sizes = [16, 18, 20];
      document.documentElement.style.setProperty('--base', sizes[sz] + 'px');
    })();
  </script>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← Mehmood</a>
    <h1>Writing</h1>
    <hr>

    <ul class="writing-list">
      <li>
        <a href="Short Essays/Idk What Should I write.html">Idk What Should I Write</a>
        <span class="date">Jun 2026</span>
      </li>
    </ul>

    <footer class="foot">
      <button class="ctrl-btn" id="theme-btn">◐ light / dark</button>
      <button class="ctrl-btn" id="size-btn">A+</button>
    </footer>
  </div>

  <script>
    (function() {
      var sizes = [16, 18, 20];
      var si = parseInt(localStorage.getItem('sz') || '0');

      document.getElementById('theme-btn').addEventListener('click', function() {
        var d = document.documentElement.classList.toggle('dark');
        localStorage.setItem('dark', d ? '1' : '0');
      });

      document.getElementById('size-btn').addEventListener('click', function() {
        si = (si + 1) % sizes.length;
        localStorage.setItem('sz', si);
        document.documentElement.style.setProperty('--base', sizes[si] + 'px');
      });
    })();
  </script>
</body>
</html>
