<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>About — Mehmood</title>
  <link rel="stylesheet" href="Style.css" />
  <script>
    (function() {
      if (localStorage.getItem('light') === '1') document.documentElement.classList.add('light');
      var sz = parseInt(localStorage.getItem('sz') || '0');
      document.documentElement.style.setProperty('--base', [16,18,20][sz] + 'px');
    })();
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← Mehmood</a>
    <h1>About</h1>
    <hr>

    <ul class="bullets">
      <li>polymath</li>
      <li>i verbalize the thoughts you can't put into words</li>
      <li>building products solo</li>
      <li><a href="mailto:mehmood@example.com">mehmood@example.com</a></li>
    </ul>

    <footer class="foot">
      <button class="ctrl-btn" id="theme-btn">light</button>
      <button class="ctrl-btn" id="size-btn">text size</button>
    </footer>
  </div>

  <script>
    (function() {
      var sizes = [16, 18, 20];
      var si = parseInt(localStorage.getItem('sz') || '0');
      var themeBtn = document.getElementById('theme-btn');
      function updateThemeLabel() {
        themeBtn.textContent = document.documentElement.classList.contains('light') ? 'dark' : 'light';
      }
      updateThemeLabel();
      themeBtn.addEventListener('click', function() {
        var l = document.documentElement.classList.toggle('light');
        localStorage.setItem('light', l ? '1' : '0');
        updateThemeLabel();
      });
      document.getElementById('size-btn').addEventListener('click', function() {
        si = (si + 1) % sizes.length;
        localStorage.setItem('sz', si);
        document.documentElement.style.setProperty('--base', sizes[si] + 'px');
      });
    })();
  </script>
</body>
</html>
